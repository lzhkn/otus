---
- name: Deploy nginx on Ubuntu
  hosts: localhost
  become: yes

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
      notify: Start nginx

    - name: Deploy nginx config from template
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'
      notify: Restart nginx

    - name: Ensure nginx is enabled
      ansible.builtin.systemd:
        name: nginx
        enabled: yes

  handlers:

    - name: Start nginx
      ansible.builtin.systemd:
        name: nginx
        state: started

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
